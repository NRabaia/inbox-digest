kind = "web"
previewPath = "/"
title = "Inbox Digest"
version = "1.0.0"
id = "artifacts/inbox-digest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19201

[services.development]
run = "pnpm --filter @workspace/inbox-digest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inbox-digest", "run", "build" ]
publicDir = "artifacts/inbox-digest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19201"
BASE_PATH = "/"
